<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" fill="none">
  <!-- Y'TILIKAN Lockup — Horizontal, Color on Dark -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0B1424"/>
      <stop offset="100%" stop-color="#050810"/>
    </linearGradient>
  </defs>
  <rect width="600" height="160" rx="16" fill="url(#bg)"/>

  <!-- Mark (mask) scaled to fit left -->
  <g transform="translate(40,80)">
    <path d="M-30,-70 C-30,-70 -40,-40 -40,0 C-40,40 -30,70 -30,70
             L-20,80 L20,80 L30,70
             C30,70 40,40 40,0 C40,-40 30,-70 30,-70
             C30,-70 20,-72 0,-75 C-20,-72 -30,-70 -30,-70Z"
          stroke="#E8E8E8" stroke-width="2" fill="none"/>
    <line x1="-12" y1="-57" x2="12" y2="-57" stroke="#E8E8E8" stroke-width="1.5" opacity="0.5"/>
    <line x1="-10" y1="-53" x2="10" y2="-53" stroke="#E8E8E8" stroke-width="1.5" opacity="0.5"/>
    <path d="M-25,-22 C-25,-32 -12,-32 -10,-22 C-10,-15 -25,-12 -25,-22Z"
          stroke="#C49A3C" stroke-width="2" fill="none"/>
    <ellipse cx="-17" cy="-23" rx="2.5" ry="2.5" fill="#C49A3C"/>
    <path d="M25,-22 C25,-32 12,-32 10,-22 C10,-15 25,-12 25,-22Z"
          stroke="#C49A3C" stroke-width="2" fill="none"/>
    <ellipse cx="17" cy="-23" rx="2.5" ry="2.5" fill="#C49A3C"/>
    <line x1="0" y1="-10" x2="0" y2="20" stroke="#E8E8E8" stroke-width="2"/>
    <path d="M-5,20 C-5,28 5,28 5,20" stroke="#E8E8E8" stroke-width="1.5" fill="none"/>
    <path d="M-8,37 C-3,42 3,42 8,37" stroke="#E8E8E8" stroke-width="1.5" fill="none"/>
  </g>

  <!-- Vertical divider -->
  <line x1="100" y1="30" x2="100" y2="130" stroke="#C49A3C" stroke-width="1" opacity="0.4"/>

  <!-- Wordmark -->
  <text x="125" y="72" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="38" fill="#E8E8E8" letter-spacing="8">Y'TILIKAN</text>
  <text x="125" y="105" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="13" fill="#8899AA" letter-spacing="6">DÉMOCRATISER L'IA EN AFRIQUE</text>
</svg>
